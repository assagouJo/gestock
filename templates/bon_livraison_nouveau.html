{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h4>Créer bon de livraison</h4>

<form method="POST" action="{{ url_for('create_bon_livraison') }}">

<input type="hidden" name="commande_id" value="{{ commande.id }}">

<p>
<strong>Client :</strong>
{{ commande.client.nom_client }}
</p>

<table class="table table-bordered">

<thead class="table-light">

<tr>
<th>Produit</th>
<th>Commandé</th>
<th>Livrer</th>
<th>N° Série</th>
</tr>

</thead>

<tbody>

{% for ligne in commande.lignes if ligne.reste_a_livrer > 0 %}

<tr>

<td>

{{ ligne.produit.nom_produit }}

<input type="hidden"
name="produit_id[]"
value="{{ ligne.produit.id }}">

<input type="hidden"
name="ligne_commande_id[]"
value="{{ ligne.id }}">

</td>

<td>

{{ ligne.quantite }}

</td>

<td>

<input type="number"
name="quantite[]"
class="form-control"
value="{{ ligne.reste_a_livrer }}"
min="0"
max="{{ ligne.reste_a_livrer }}">

</td>

<td>

<input type="text"
name="numero_serie[]"
class="form-control">

</td>

</tr>

{% endfor %}

</tbody>

</table>

<button class="btn btn-success">

Créer livraison

</button>

</form>

</div>

{% endblock %}
