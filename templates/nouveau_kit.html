{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h5 class="mb-0">Nouveau Kit Proforma</h5>
</div>

<div class="card-body">

<form method="POST" action="{{ url_for('create_kit_proforma') }}">

<!-- CLIENT -->

<div class="row mb-3">

<div class="col-md-6">
<label class="form-label">Client</label>

<select name="client_id" class="form-control" required>

<option value="">Choisir client</option>

{% for client in clients %}
<option value="{{ client.id }}">
{{ client.nom_client }}
</option>
{% endfor %}

</select>
</div>

<div class="col-md-6">
<label class="form-label">Attn</label>
<input type="text" name="attn" class="form-control">
</div>

</div>


<!-- CONDITIONS -->

<div class="row mb-3">

<div class="col-md-4">
<label class="form-label">Condition paiement</label>
<input type="text" name="condition_paiement" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Délai livraison</label>
<input type="text" name="delai_livraison" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Garantie</label>
<input type="text" name="garantie" class="form-control">
</div>

</div>

<hr>

<h6>Produits du kit</h6>

<div class="table-responsive">

<table class="table table-bordered" id="table_produits">

<thead class="table-dark">

<tr>
<th>Produit</th>
<th>Quantité</th>
<th></th>
</tr>

</thead>

<tbody id="lignes_produits">

<tr>

<td>

    <div class="produits-checkbox">

    {% for produit in produits %}

    <div class="form-check">

    <input class="form-check-input"
        type="checkbox"
        name="produit_id[]"
        value="{{ produit.id }}"
        id="prod_{{ produit.id }}">

    <label class="form-check-label" for="prod_{{ produit.id }}">
    {{ produit.nom_produit }}
    </label>

    </div>

    {% endfor %}

    </div>

</td>

<td>
    <input type="number" name="quantite[]" class="form-control" value="1">
</td>

<td>
<button type="button" class="btn btn-danger supprimer">
X
</button>
</td>

</tr>

</tbody>

</table>

</div>

<button type="button" class="btn btn-primary mb-3" id="add_ligne">
Ajouter produit
</button>

<hr>

<!-- PRIX GLOBAL -->

<div class="row">

<div class="col-md-4 offset-md-8">

<label class="form-label">Prix Global du Kit</label>

<input type="number" step="0.01" name="prix_global" class="form-control" required>

</div>

</div>

<br>

<button type="submit" class="btn btn-success">
Créer Kit Proforma
</button>

<a href="{{ url_for('list_kit_proforma') }}" class="btn btn-secondary">
Annuler
</a>

</form>

</div>

</div>

</div>

<script>

let index = 1;

document.getElementById("add_ligne").addEventListener("click", function(){

let table = document.getElementById("lignes_produits")
let newRow = table.rows[0].cloneNode(true)

newRow.querySelectorAll("input").forEach(function(input){
input.value = 1
})

newRow.querySelectorAll("select").forEach(function(select){

if(select.classList.contains("accessoires-select")){
select.name = "accessoires[" + index + "][]"
}

select.value = ""
})

table.appendChild(newRow)

index++

})

document.addEventListener("click", function(e){

if(e.target.classList.contains("supprimer")){

let rows = document.querySelectorAll("#lignes_produits tr")

if(rows.length > 1){
e.target.closest("tr").remove()
}

}

})

</script>

{% endblock %}
