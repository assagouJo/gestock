{% extends "base.html" %}
{% block title %}Nouvelle Proforma{% endblock %}

{% block content %}

<div class="container p-4">

<h4 class="text-success mb-3">Nouvelle Proforma</h4>

<form method="POST" action="{{ url_for('create_proforma') }}">

<!-- Client -->
<div class="card mb-3">
<div class="card-body">

<div class="row">

    <div class="col-md-6">

    <label class="fw-bold">Client</label>

    <select name="client_id" class="form-control" required>
    <option value="">Choisir client</option>

    {% for c in clients %}
    <option value="{{ c.id }}">{{ c.nom_client }}</option>
    {% endfor %}

    </select>

    </div>
    <div class="col-md-6">
        <label class="fw-bold">ATTN </label>
        <input type="text"
        name="attn"
        class="form-control"
        placeholder="Ex: attn">
    </div>

</div>

</div>
</div>


<!-- Termes de la proforma -->
<div class="card mb-3">
<div class="card-body">

<h6 class="text-secondary mb-3">Conditions de la Proforma</h6>

<div class="row">

<div class="col-md-4">

<label class="fw-bold">Condition de paiement</label>

<input type="text"
name="condition_paiement"
class="form-control"
placeholder="Ex: 50% à la commande" required>

</div>

<div class="col-md-4">

<label class="fw-bold">Délai de livraison</label>

<input type="text"
name="delai_livraison"
class="form-control"
placeholder="Ex: 7 jours" required>

</div>

<div class="col-md-4">

<label class="fw-bold">Garantie</label>

<input type="text"
name="garantie"
class="form-control"
placeholder="Ex: 12 mois">

</div>

</div>

</div>
</div>


<!-- Produits -->
<div class="card">
<div class="card-body">

<h6 class="text-secondary mb-3">Produits</h6>

<table class="table table-bordered" id="tableProduits">

<thead class="table-light">
<tr>
<th>Produit</th>
<th width="120">Quantité</th>
<th width="150">Prix</th>
<th width="60"></th>
</tr>
</thead>

<tbody>

<tr>

<td>
<select name="produit_id[]" class="form-control">

{% for p in produits %}
<option value="{{ p.id }}">{{ p.nom_produit }}</option>
{% endfor %}

</select>
</td>

<td>
<input type="number" name="quantite[]" class="form-control" required>
</td>

<td>
<input type="number" step="0.01" name="prix[]" class="form-control" required>
</td>

<td>
<button type="button" onclick="addRow()" class="btn btn-success">
+
</button>
</td>

</tr>

</tbody>

</table>
<div class="d-fless justify-content-start align-items-center">
    <button class="btn btn-primary mt-2">
    Créer Proforma
    </button>
    
    <a href="{{ url_for('liste_proformas') }}"
    class="btn mt-2 btn-secondary">
    RETOUR
    </a>
</div>

</div>
</div>

</form>

</div>


<script>

function addRow(){

let table = document.getElementById("tableProduits").getElementsByTagName('tbody')[0];

let row = table.insertRow();

row.innerHTML = `

<td>
<select name="produit_id[]" class="form-control">

{% for p in produits %}
<option value="{{ p.id }}">{{ p.nom_produit }}</option>
{% endfor %}

</select>
</td>

<td>
<input type="number" name="quantite[]" class="form-control" value="1">
</td>

<td>
<input type="number" step="0.01" name="prix[]" class="form-control">
</td>

<td>
<button type="button" onclick="this.closest('tr').remove()" class="btn btn-danger">
x
</button>
</td>

`;

}

</script>

{% endblock %}
