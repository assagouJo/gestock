{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='style/new_proforma.css') }}">
{% endblock %}

{% block content %}

<div class="container mt-4">

<h3>Nouvelle Proforma</h3>

<form method="POST" action="{{ url_for('create_proforma') }}">

<div class="row">

<div class="col-md-6">
<label>Client</label>
<select name="client_id" class="form-control" required>
<option value="">Choisir client</option>

{% for client in clients %}
<option value="{{ client.id }}">
{{ client.nom_client }}
</option>
{% endfor %}

</select>
</div>

<div class="col-md-6">
<label>Attention (Attn)</label>
<input type="text" name="attn" class="form-control">
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<label>Condition de paiement</label>
<input type="text" name="condition_paiement" class="form-control">
</div>

<div class="col-md-4">
<label>Délai de livraison</label>
<input type="text" name="delai_livraison" class="form-control">
</div>

<div class="col-md-4">
<label>Garantie</label>
<input type="text" name="garantie" class="form-control">
</div>

</div>

<hr>

<h5>Produits</h5>

<table class="table table-bordered" id="table_produits">

<thead>
<tr>

<th>Produit</th>
<th>type</th>
<th>Quantité</th>
<th>Prix Unitaire</th>
<th>Sous Total</th>
<th></th>

</tr>
</thead>

<tbody id="lignes_produit">

<tr>

<td>

<select name="produit_id[]" class="form-control" required>

<option value="">Choisir produit</option>

{% for produit in produits %}
<option value="{{ produit.id }}" aria-required="true">
{{ produit.nom_produit }}
</option>
{% endfor %}

</select>

</td>

<td>
<select name="conditionnement[]" class="form-control">

{% for cond in conditionnements %}
<option value="{{ cond.value }}">
{{ cond.value }}
</option>
{% endfor %}

</select>
</td>

<td>
<input type="number" name="quantite[]" class="form-control quantite" value="1">
</td>

<td>
<input type="number" step="0.01" name="prix[]" class="form-control prix" required>
</td>

<td>
<input type="text" class="form-control sous_total" readonly>
</td>

<td>
<button type="button" class="btn btn-danger supprimer">X</button>
</td>

</tr>

</tbody>

</table>

<button type="button" class="btn btn-primary" id="add_ligne">
Ajouter ligne
</button>

<hr>

<div class="row">

<div class="col-md-4 offset-md-8">

<label>Total</label>

<input type="text" id="total_general" class="form-control" readonly>

</div>

</div>

<br>

<button type="submit" class="btn btn-success">
Créer Proforma
</button>

<a href="{{ url_for('liste_proformas') }}"
class="btn btn-sm btn-secondary">
Retour
</a>

</form>

</div>

<script>

function calculerTotal() {

let total = 0

document.querySelectorAll("#lignes_produit tr").forEach(function(row){

let qte = row.querySelector(".quantite").value
let prix = row.querySelector(".prix").value

let sous_total = qte * prix

row.querySelector(".sous_total").value = sous_total.toFixed(2)

total += sous_total

})

document.getElementById("total_general").value = total.toFixed(2)

}

document.addEventListener("input", function(e){

if(e.target.classList.contains("quantite") || e.target.classList.contains("prix")){

calculerTotal()

}

})

document.getElementById("add_ligne").addEventListener("click", function(){

let table = document.getElementById("lignes_produit")

let newRow = table.rows[0].cloneNode(true)

newRow.querySelectorAll("input").forEach(function(input){

input.value = ""

})

table.appendChild(newRow)

})

document.addEventListener("click", function(e){

if(e.target.classList.contains("supprimer")){

let rows = document.querySelectorAll("#lignes_produit tr")

if(rows.length > 1){

e.target.closest("tr").remove()

calculerTotal()

}

}

})

</script>

{% endblock %}
