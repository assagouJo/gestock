<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    
    {% block styles %}
    <style>
        /* Police Bookman Old Style via Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Bookman+Old+Style&display=swap');
        
        /* Application de la police */
        * {
            font-family: 'Bookman Old Style', 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
        }
        
        body {
            font-family: 'Bookman Old Style', 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            font-weight: normal;
            font-size: 12px;
            line-height: 1.5;
            color: #333;
        }
        
        /* Pour le texte en gras */
        strong, b, th, h1, h2, h3, h4, h5, h6,
        .bold, .font-bold, .produit-principal {
            font-family: 'Bookman Old Style', 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            font-weight: bold;
        }
        
        /* Pour le texte semi-gras */
        .produit-principal, .total-row, .detail-label {
            font-weight: 600;
        }
        
        /* Pour les titres */
        h1 {
            font-weight: bold;
            font-size: 24px;
        }
        
        h2 {
            font-weight: bold;
            font-size: 20px;
        }
        
        h3 {
            font-weight: 600;
            font-size: 18px;
        }
        
        /* Pour les détails */
        .detail-item, .detail-value, p, span, div {
            font-weight: normal;
        }
        
        .detail-label {
            font-weight: 600;
        }
        
        /* Pour les éléments monospace */
        code, pre, .monospace, .numero-serie {
            font-family: 'Courier New', monospace;
        }
        
        /* Pour l'impression PDF */
        @media print {
            body {
                font-size: 11px;
            }
            
            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
    {% endblock %}
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/styles.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="{{url_for('static', filename='js/bootstrap.bundle.min.js')}}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/png" sizes="256x256" href="/static/images/logo_imedical-1.png">
    
    {% block head %}{% endblock %}
</head>
<body>   
    {% block content %}{% endblock %}
</body>
</html>
