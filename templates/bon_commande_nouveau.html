{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h4>Nouveau bon de commande</h4>

<div class="alert alert-info">
   <i class="bi bi-info-circle"></i>
   <strong>Information :</strong> Seuls les produits disponibles en stock sont affichés.
</div>

<form method="POST" action="{{ url_for('create_bon_commande') }}">

<div class="mb-3">
   <label class="form-label fw-bold">Client</label>
   <select name="client_id" class="form-control" required>
      <option value="">-- Choisir un client --</option>
      {% for client in clients %}
         <option value="{{ client.id }}">
            {{ client.nom_client }}
         </option>
      {% endfor %}
   </select>
</div>

<table class="table table-bordered">
   <thead class="table-dark">
      <tr>
         <th>Produit</th>
         <th>Conditionnement</th>
         <th>Stock disponible</th>
         <th>Quantité</th>
         <th>Prix (FCFA)</th>
         <th>Sous-total</th>
         <th></th>
      </tr>
   </thead>
   <tbody id="table_lignes">
      <tr class="ligne-produit">
         <td width="30%">
            <select name="produit_id[]" class="form-control produit-select" required>
               <option value="">-- Choisir un produit --</option>
               {% for produit in produits %}
                  <option value="{{ produit.id }}" 
                          data-stock="{{ produit.stock_disponible }}"
                          data-nom="{{ produit.nom_produit }}">
                     {{ produit.nom_produit }} - {{ produit.model }} (Stock: {{ produit.stock_disponible }})
                  </option>
               {% endfor %}
            </select>
         </td>
         <td width="20%">
            <select name="type_conditionnement[]" class="form-control conditionnement-select" required>
               <option value="">-- Choisir --</option>
               {% for c in TypeConditionnement %}
                  <option value="{{ c.value }}">
                     {{ c.value.capitalize() }}
                  </option>
               {% endfor %}
            </select>
         </td>
         <td width="15%" class="text-center stock-disponible">
            <span class="badge bg-secondary">-</span>
         </td>
         <td width="15%">
            <input type="number" 
                   name="quantite[]" 
                   class="form-control quantite-input" 
                   min="1" 
                   step="1"
                   required>
         </td>
         <td width="15%">
            <input type="number" 
                   step="0.01" 
                   name="prix_unitaire[]" 
                   class="form-control prix-input" 
                   min="0"
                   required>
         </td>
         <td width="10%" class="text-center sous-total">0</td>
         <td width="5%" class="text-center">
            <button type="button" class="btn btn-danger btn-sm remove_row">
               ✖
            </button>
         </td>
      </tr>
   </tbody>
   <tfoot>
      <tr class="table-light">
         <td colspan="5" class="text-end fw-bold">Total Général :</td>
         <td colspan="2" class="text-center fw-bold fs-5 text-primary" id="total-general">0 FCFA</td>
      </tr>
   </tfoot>
</table>

<button type="button" id="add_row" class="btn btn-primary mb-3">
   ➕ Ajouter produit
</button>
<br>

<button type="submit" class="btn btn-success">
   <i class="bi bi-check-circle"></i> Enregistrer le bon de commande
</button>

<a href="{{ url_for('liste_bons_commandes') }}" class="btn btn-secondary">
   <i class="bi bi-arrow-left"></i> Annuler
</a>

</form>

</div>

<script>

document.addEventListener("DOMContentLoaded", function() {
    
    const tbody = document.getElementById("table_lignes");
    
    // Fonction pour calculer le total général
    function calculerTotalGeneral() {
        let total = 0;
        document.querySelectorAll(".ligne-produit").forEach(ligne => {
            const sousTotal = parseFloat(ligne.querySelector(".sous-total").textContent) || 0;
            total += sousTotal;
        });
        document.getElementById("total-general").textContent = total.toLocaleString('fr-FR') + " FCFA";
    }
    
    // Fonction pour calculer le sous-total d'une ligne
    function calculerSousTotal(ligne) {
        const quantite = parseInt(ligne.querySelector(".quantite-input").value) || 0;
        const prix = parseFloat(ligne.querySelector(".prix-input").value) || 0;
        const sousTotal = quantite * prix;
        ligne.querySelector(".sous-total").textContent = sousTotal.toLocaleString('fr-FR');
        calculerTotalGeneral();
        return sousTotal;
    }
    
    // Fonction pour afficher le stock disponible
    function afficherStockDisponible(ligne, produitSelect) {
        const selectedOption = produitSelect.options[produitSelect.selectedIndex];
        const stock = parseInt(selectedOption.getAttribute("data-stock")) || 0;
        const nomProduit = selectedOption.getAttribute("data-nom") || "";
        
        const stockCell = ligne.querySelector(".stock-disponible");
        const quantiteInput = ligne.querySelector(".quantite-input");
        
        if (stock > 0) {
            stockCell.innerHTML = `<span class="badge bg-success">${stock} unités</span>`;
            stockCell.setAttribute("data-stock", stock);
            quantiteInput.max = stock;
            quantiteInput.placeholder = `Max: ${stock}`;
            quantiteInput.disabled = false;
        } else {
            stockCell.innerHTML = `<span class="badge bg-danger">Rupture</span>`;
            stockCell.setAttribute("data-stock", "0");
            quantiteInput.disabled = true;
            quantiteInput.placeholder = "Produit en rupture";
            quantiteInput.value = "";
        }
    }
    
    // Fonction pour réinitialiser une ligne
    function resetLigne(ligne) {
        ligne.querySelectorAll("input").forEach(input => {
            if (input.type !== "button") {
                input.value = "";
                input.disabled = false;
                input.max = "";
            }
        });
        ligne.querySelectorAll("select").forEach(select => {
            select.selectedIndex = 0;
        });
        ligne.querySelector(".stock-disponible").innerHTML = '<span class="badge bg-secondary">-</span>';
        ligne.querySelector(".sous-total").textContent = "0";
    }
    
    // Ajouter une nouvelle ligne
    document.getElementById("add_row").onclick = function() {
        let table = document.getElementById("table_lignes");
        let row = table.rows[0].cloneNode(true);
        resetLigne(row);
        table.appendChild(row);
    }
    
    // Supprimer une ligne
    document.addEventListener("click", function(e) {
        if(e.target.classList.contains("remove_row")) {
            let row = e.target.closest("tr");
            if(document.querySelectorAll("#table_lignes tr").length > 1) {
                row.remove();
                calculerTotalGeneral();
            } else {
                alert("Au moins un produit est requis");
            }
        }
    });
    
    // Calcul automatique lors des changements
    tbody.addEventListener("input", function(e) {
        if(e.target.classList.contains("quantite-input") || 
           e.target.classList.contains("prix-input")) {
            const ligne = e.target.closest("tr");
            calculerSousTotal(ligne);
        }
    });
    
    // Charger le stock disponible quand un produit est sélectionné
    tbody.addEventListener("change", function(e) {
        if(e.target.classList.contains("produit-select")) {
            const ligne = e.target.closest("tr");
            const produitSelect = e.target;
            const quantiteInput = ligne.querySelector(".quantite-input");
            const conditionSelect = ligne.querySelector(".conditionnement-select");
            
            if(produitSelect.value) {
                afficherStockDisponible(ligne, produitSelect);
                quantiteInput.disabled = false;
                conditionSelect.disabled = false;
            } else {
                ligne.querySelector(".stock-disponible").innerHTML = '<span class="badge bg-secondary">-</span>';
                quantiteInput.disabled = true;
                conditionSelect.disabled = true;
                quantiteInput.value = "";
            }
        }
    });
    
    // Validation avant soumission
    const form = document.querySelector("form");
    form.addEventListener("submit", function(e) {
        let hasError = false;
        
        document.querySelectorAll(".ligne-produit").forEach(ligne => {
            const produitSelect = ligne.querySelector(".produit-select");
            const quantite = parseInt(ligne.querySelector(".quantite-input").value);
            const prix = parseFloat(ligne.querySelector(".prix-input").value);
            const conditionnement = ligne.querySelector(".conditionnement-select").value;
            const stockDispo = parseInt(ligne.querySelector(".stock-disponible").getAttribute("data-stock") || 0);
            
            if(produitSelect.value && quantite > 0) {
                if(!conditionnement) {
                    alert("Veuillez sélectionner un conditionnement");
                    hasError = true;
                    e.preventDefault();
                    return;
                }
                if(!prix || prix <= 0) {
                    alert("Veuillez saisir un prix unitaire valide");
                    hasError = true;
                    e.preventDefault();
                    return;
                }
                if(quantite > stockDispo) {
                    alert(`Stock insuffisant pour ${produitSelect.options[produitSelect.selectedIndex].text}. Disponible: ${stockDispo}`);
                    hasError = true;
                    e.preventDefault();
                    return;
                }
            }
        });
        
        if(hasError) e.preventDefault();
    });
    
    // Initialiser la première ligne
    const premiereLigne = tbody.querySelector(".ligne-produit");
    resetLigne(premiereLigne);
    
    // Désactiver la première ligne au démarrage
    premiereLigne.querySelector(".quantite-input").disabled = true;
    premiereLigne.querySelector(".conditionnement-select").disabled = true;
    
});

</script>

<style>
    .table th, .table td {
        vertical-align: middle;
    }
    
    .quantite-input, .prix-input {
        text-align: center;
    }
    
    .badge {
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
    }
    
    select:disabled, input:disabled {
        background-color: #e9ecef;
        cursor: not-allowed;
    }
    
    .alert-info {
        background-color: #e7f3ff;
        border-color: #b8daff;
        color: #004085;
    }
</style>

{% endblock %}
