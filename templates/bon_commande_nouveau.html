{% extends "base.html" %}
{% block title %}Nouveau Bon de Commande{% endblock %}

{% block content %}

<div class="container p-4">

<h4 class="text-success mb-3">📦 Nouveau Bon de Commande</h4>

<form method="POST" action="{{ url_for('create_bon_commande') }}">

<div class="card mb-3">
<div class="card-body">

<label class="fw-bold">Fournisseur</label>

<select name="fournisseur_id"
class="form-control"
required>

<option value="">Choisir fournisseur</option>

{% for f in fournisseurs %}
<option value="{{ f.id }}">{{ f.nom_fournisseur }}</option>
{% endfor %}

</select>

</div>
</div>


<div class="card">
<div class="card-body">

<h6 class="text-secondary mb-3">Produits</h6>

<table class="table table-bordered" id="tableProduits">

<thead class="table-light">
<tr>
<th>Produit</th>
<th width="120">Quantité</th>
<th width="150">Prix</th>
<th width="60"></th>
</tr>
</thead>

<tbody>

<tr>

<td>
<select name="produit_id[]" class="form-control">

<option value="">Choisir produit</option>

{% for p in produits %}
<option value="{{ p.id }}">{{ p.nom_produit }}</option>
{% endfor %}

</select>
</td>

<td>
<input type="number"
name="quantite[]"
class="form-control"
required>
</td>

<td>
<input type="number"
name="prix_unitaire[]"
step="0.01"
class="form-control"
required>
</td>

<td>

<button type="button"
onclick="addRow()"
class="btn btn-success">

+

</button>

</td>

</tr>

</tbody>

</table>


<div class="d-flex justify-content-start align-items-center">

<button class="btn btn-primary mt-2">

Créer Bon

</button>

<a href="{{ url_for('liste_bons_commandes') }}"
class="btn mt-2 btn-secondary ms-2">

Retour

</a>

</div>

</div>
</div>

</form>

</div>


<script>

function addRow(){

let table = document.getElementById("tableProduits")
.getElementsByTagName('tbody')[0];

let row = table.insertRow();

row.innerHTML = `

<td>
<select name="produit_id[]" class="form-control">

<option value="">Choisir produit</option>

{% for p in produits %}
<option value="{{ p.id }}">{{ p.nom_produit }}</option>
{% endfor %}

</select>
</td>

<td>
<input type="number"
name="quantite[]"
class="form-control">
</td>

<td>
<input type="number"
name="prix_unitaire[]"
step="0.01"
class="form-control">
</td>

<td>
<button type="button"
onclick="this.closest('tr').remove()"
class="btn btn-danger">

x

</button>
</td>

`;

}

</script>

{% endblock %}
