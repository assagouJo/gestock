{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h4>Nouveau bon de commande</h4>

<form method="POST" action="{{ url_for('create_bon_commande') }}">

<div class="mb-3">

<label>Client</label>

<select name="client_id" class="form-control">

{% for client in clients %}

<option value="{{ client.id }}">
{{ client.nom_client }}
</option>

{% endfor %}

</select>

</div>

<table class="table table-bordered">

<thead class="table-light">
<tr>
<th>Produit</th>
<th>Conditionnement</th>
<th>Quantité</th>
<th>Prix</th>
<th></th>
</tr>
</thead>

<tbody id="table_lignes">

<tr>

<td>

<select name="produit_id[]" class="form-control">

{% for produit in produits %}

<option value="{{ produit.id }}">
{{ produit.nom_produit }}
</option>

{% endfor %}

</select>

</td>

<td>
    <select name="type_conditionnement[]" class="form-control">

    {% for c in TypeConditionnement %}

    <option value="{{ c.value }}">
    {{ c.value.capitalize() }}
    </option>

    {% endfor %}

    </select>
</td>

<td>

<input type="number" name="quantite[]" class="form-control">

</td>

<td>

<input type="number" step="0.01" name="prix_unitaire[]" class="form-control">

</td>

<td>

<button type="button" class="btn btn-danger remove_row">
X
</button>

</td>

</tr>

</tbody>

</table>

<button type="button" id="add_row" class="btn btn-primary">
➕ Ajouter produit
</button>

<br><br>

<button class="btn btn-success">
Enregistrer
</button>

</form>

</div>

<script>

document.getElementById("add_row").onclick = function(){

let table = document.getElementById("table_lignes")

let row = table.rows[0].cloneNode(true)

row.querySelectorAll("input").forEach(input => input.value="")

table.appendChild(row)

}

document.addEventListener("click", function(e){

if(e.target.classList.contains("remove_row")){

let row = e.target.closest("tr")

if(document.querySelectorAll("#table_lignes tr").length > 1){

row.remove()

}

}

})

</script>

{% endblock %}
