{% extends "base.html" %}

{% block title %}Modifier Bon de Livraison{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow-sm">

<div class="card-header bg-primary text-white">
<h5 class="mb-0">📦 Modifier Bon de Livraison</h5>
</div>

<div class="card-body">

<form method="POST">

<div class="row">

<!-- CLIENT -->
<div class="col-md-6 mb-3">

<label class="form-label fw-bold">Client</label>

<select name="client_id" class="form-select" required>

{% for client in clients %}

<option value="{{ client.id }}"
{% if client.id == bon.client_id %} selected {% endif %}>

{{ client.nom_client }}

</option>

{% endfor %}

</select>

</div>


<!-- DATE -->
<div class="col-md-6 mb-3">

<label class="form-label fw-bold">Date</label>

<input type="date"
name="date_creation"
class="form-control"
value="{{ bon.date_creation.strftime('%Y-%m-%d') }}">

</div>

</div>


<hr>

<h5 class="mb-3">Produits livrés</h5>

<div class="table-responsive">

<table class="table table-striped table-hover align-middle">

<thead class="table-light">

<tr>
<th style="width:40%">Produit</th>
<th style="width:20%">Quantité</th>
<th style="width:40%">Numéro de Série</th>
</tr>

</thead>

<tbody>

{% for ligne in bon.lignes %}

<tr>

<td>

<strong>{{ ligne.produit.nom_produit }}</strong>

<input type="hidden"
name="produit_id[]"
value="{{ ligne.produit_id }}">

<input type="hidden"
name="ligne_commande_id[]"
value="{{ ligne.ligne_commande_id }}">

</td>


<td>

<input type="number"
name="quantite[]"
class="form-control"
value="{{ ligne.quantite }}"
min="0">

</td>


<td>

<input type="text"
name="numero_serie[]"
class="form-control"
value="{{ ligne.numero_serie }}">

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>


<hr>

<!-- MENTION -->
<div class="mb-3">

<label class="form-label fw-bold">Mention / Nota Bene</label>

<textarea name="nota_bene"
class="form-control"
rows="3"
placeholder="Ajouter une mention si nécessaire...">

{{ bon.nota_bene }}

</textarea>

</div>


<!-- BOUTONS -->
<div class="d-flex justify-content-between mt-4">

<a href="{{ url_for('liste_bons_livraison') }}"
class="btn btn-outline-secondary">

⬅ Retour

</a>

<button type="submit"
class="btn btn-success">

💾 Enregistrer les modifications

</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
